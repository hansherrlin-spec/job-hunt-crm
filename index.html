function submitQualification(jobId, decision) {
  const j = (DATA.savedJobs || []).find(x => x.id === jobId);
  if (!j) return;

  // Collect selected reason chips
  const chipContainer = document.getElementById('qualChips_' + jobId);
  const selectedReasons = [];
  if (chipContainer) {
    chipContainer.querySelectorAll('input[type=checkbox]:checked').forEach(cb => {
      selectedReasons.push(cb.value);
    });
  }

  // Collect free text
  const freeEl = document.getElementById('qualFree_' + jobId);
  const freeText = freeEl ? freeEl.value.trim() : '';

  // Build display reason
  const allReasons = (decision === 'qualified' ? QUALIFY_REASONS : DISQUALIFY_REASONS);
  const reasonLabels = selectedReasons.map(id => {
    const r = allReasons.find(x => x.id === id);
    return r ? r.label : id;
  });
  const displayReason = [...reasonLabels, freeText].filter(Boolean).join('. ');

  // Update job
  j.qualification = decision;
  j.qualifyReason = displayReason;
  j.qualifyReasons = selectedReasons;
  j.qualifyFreeText = freeText;
  j.qualifiedAt = today();
  j.reviewed = true;

  // Learn from this decision
  learnFromDecision(j, decision, selectedReasons, freeText);

  qualifyingJobId = null;
  saveData(DATA);
  toast(decision === 'qualified' ? 'Job approved - preferences updated' : 'Job rejected - preferences updated');
  render();
}

function resetQualification(jobId) {
  const j = (DATA.savedJobs || []).find(x => x.id === jobId);
  if (!j) return;

  // Remove from learned preferences
  const prefs = getLearnedPrefs();
  const list = j.qualification === 'qualified' ? prefs.qualified : prefs.disqualified;
  const idx = list.findIndex(p => p.company === j.company && p.role === j.role);
  if (idx >= 0) list.splice(idx, 1);

  j.qualification = null;
  j.qualifyReason = '';
  j.qualifyReasons = [];
  j.qualifyFreeText = '';
  j.qualifiedAt = null;
  saveData(DATA);
  toast('Qualification reset');
  render();
}

async function runMultiSourceSearch(terms, location, sources) {
  var allResults = [];
  var existingUrls = new Set((DATA.savedJobs || []).map(function(j) { return (j.url || '').toLowerCase(); }));
  var progressEl = document.getElementById('searchProgress');
  var resultsArea = document.getElementById('searchResultsArea');
  var completed = 0;
  var totalSources = sources.length;

  function updateProgress(sourceName, status) {
    completed++;
    var isError = status === 'error' || status === '0 found';
    var statusColor = isError ? 'var(--text-light)' : 'var(--success)';
    var icon = isError ? '&#9675;' : '&#9679;';
    if (progressEl) progressEl.innerHTML += '<div style="color:' + statusColor + ';">' + icon + ' ' + escHtml(sourceName) + ': ' + status + '</div>';
    var pbar = document.getElementById('searchProgressBar');
    var plabel = document.getElementById('searchProgressLabel');
    if (pbar) pbar.style.width = Math.round((completed / totalSources) * 100) + '%';
    if (plabel) plabel.textContent = completed + ' / ' + totalSources + ' sources checked';
  }

  // Process each source in parallel
  var promises = sources.map(async function(src) {
    try {
      if (src.type === 'board' && src.id === 'platsbanken') {
        var results = await searchPlatsbanken(terms, location, existingUrls);
        updateProgress('Platsbanken', results.length + ' found');
        return results;
      }
      if (src.type === 'board' && src.id === 'linkedin') {
        var results = await searchLinkedIn(terms, location, existingUrls);
        updateProgress('LinkedIn', results.length + ' found');
        return results;
      }
      if (src.type === 'board' && src.id === 'thehub') {
        var results = await searchTheHub(terms, location, existingUrls);
        updateProgress('The Hub', results.length + ' found');
        return results;
      }
      if (src.type === 'board' && (src.id === 'indeed' || src.id === 'meetfrank')) {
        var results = await searchViaCorsProxy(src.id === 'indeed' ? 'https://se.indeed.com/jobb?q=' + encodeURIComponent(terms[0] + ' ' + location) : 'https://meetfrank.com/scaleup-jobs-in-stockholm-and-sweden-and-malmo-and-gothenburg', src.id, existingUrls);
        updateProgress(src.id === 'indeed' ? 'Indeed' : 'MeetFrank', results.length + ' found');
        return results;
      }
      if (src.type === 'hh') {
        var results = await searchHeadhunterSite(src.url, src.firm, terms, existingUrls);
        updateProgress(src.firm, results.length + ' found');
        return results;
      }
    } catch (e) {
      updateProgress(src.firm || src.id || 'Source', 'error');
      return [];
    }
    return [];
  });

  var resultSets = await Promise.all(promises);
  resultSets.forEach(function(set) { allResults = allResults.concat(set); });

  // Deduplicate by company+role
  var seen = new Set();
  allResults = allResults.filter(function(r) {
    var key = (r.company + '|' + r.role).toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // Score results
  var dj = (DATA.dreamJob && DATA.dreamJob.dream) ? DATA.dreamJob.dream : {};
  var djTitles = (dj.title || '').toLowerCase().split(',').map(function(t) { return t.trim(); });
  var djIndustries = (dj.industries || '').toLowerCase().split(',').map(function(t) { return t.trim(); });

  allResults.forEach(function(r) {
    var score = 0;
    var roleL = (r.role + ' ' + (r.industry || '')).toLowerCase();
    var descL = (r.description || '').toLowerCase();
    djTitles.forEach(function(t) { if (t && roleL.indexOf(t) >= 0) score += 30; });
    djIndustries.forEach(function(ind) { if (ind && (roleL.indexOf(ind) >= 0 || descL.indexOf(ind) >= 0)) score += 15; });
    if ((r.location || '').toLowerCase().indexOf(location.toLowerCase()) >= 0) score += 10;
    if (/director|head of|chief|vp |cco|coo|ceo/i.test(r.role)) score += 20;
    if (/sales|commercial|revenue/i.test(roleL)) score += 10;
    r._score = Math.min(score, 100);
  });

  allResults.sort(function(a, b) { return b._score - a._score; });

  if (allResults.length === 0) {
    if (resultsArea) {
      resultsArea.innerHTML = '<div style="text-align:center;padding:20px;"><div style="font-size:28px;margin-bottom:8px;">&#128204;</div><p style="color:var(--text-light);">No new matches found across selected sources.</p></div>';
    }
    return;
  }

  // Show results with limit selector and add button
  var defaultLimit = Math.min(10, allResults.length);
  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;">' +
    '<p style="font-size:12px;color:var(--text-light);margin:0;">Found ' + allResults.length + ' jobs across all sources:</p>' +
    '<div style="display:flex;align-items:center;gap:8px;">' +
    '<label style="font-size:11px;color:var(--text-light);white-space:nowrap;">Add top <select id="jobAddLimit" style="font-size:11px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);">';
  for (var n = 1; n <= Math.min(10, allResults.length); n++) {
    html += '<option value="' + n + '"' + (n === defaultLimit ? ' selected' : '') + '>' + n + '</option>';
  }
  html += '</select> jobs</label>' +
    '<button class="btn btn-primary" style="font-size:11px;padding:5px 12px;" onclick="addAllSearchResults()">Add to Swipe Queue</button>' +
    '</div></div><div style="display:flex;flex-direction:column;gap:6px;">';

  allResults.forEach(function(r, i) {
    var tierColor = r._score >= 50 ? 'var(--success)' : r._score >= 25 ? 'var(--warning)' : 'var(--text-light)';
    html += '<div class="card" style="padding:10px;border-left:3px solid ' + tierColor + ';">' +
      '<div style="display:flex;justify-content:space-between;align-items:start;">' +
      '<div style="flex:1;min-width:0;">' +
      '<div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(r.company) + ' <span style="font-weight:400;color:var(--text-light);">- ' + escHtml(r.role) + '</span></div>' +
      '<div style="font-size:11px;color:var(--text-light);margin-top:2px;">' + escHtml(r.location || '') + (r.deadline ? ' - Deadline: ' + r.deadline.substring(0, 10) : '') + '</div>' +
      '<div style="font-size:10px;color:var(--text-muted);margin-top:1px;">' + escHtml(r.source) + '</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">' +
      '<span style="font-size:11px;font-weight:600;color:' + tierColor + ';">' + r._score + 'p</span>' +
      '<button class="btn btn-primary" style="font-size:10px;padding:3px 8px;min-height:24px;" onclick="event.stopPropagation();addSearchResult(' + i + ')">+ Add</button>' +
      '</div></div></div>';
  });
  html += '</div>';

  if (resultsArea) resultsArea.innerHTML = html;
  window._searchResults = allResults;
}

async function searchPlatsbanken(terms, location, existingUrls) {
  var results = [];
  var queries = terms.slice(0, 4).map(function(t) { return t + ' ' + location; });
  for (var qi = 0; qi < queries.length; qi++) {
    try {
      var resp = await fetch('https://jobsearch.api.jobtechdev.se/search?q=' + encodeURIComponent(queries[qi]) + '&limit=10&offset=0', { headers: { 'Accept': 'application/json' } });
      if (!resp.ok) continue;
      var data = await resp.json();
      (data.hits || []).forEach(function(hit) {
        var url = hit.webpage_url || (hit.application_details && hit.application_details.url) || '';
        if (url && existingUrls.has(url.toLowerCase())) return;
        var emp = (hit.employer && hit.employer.name) || '';
        var headline = hit.headline || '';
        var desc = (hit.description && hit.description.text) ? hit.description.text.substring(0, 500) : '';

        // Detect recruiter
        var recruiterKw = ['rekrytering','recruit','headhunt','search','bemanning','staffing','konsult','urval','hanborg','hays','randstad','adecco','manpower'];
        var isRec = recruiterKw.some(function(k) { return emp.toLowerCase().includes(k); });
        if (!isRec && DATA.headhunters) isRec = DATA.headhunters.some(function(h) { return emp.toLowerCase().includes(h.firm.toLowerCase()); });

        var company = emp, source = 'Platsbanken';
        if (isRec) {
          source = 'Platsbanken (via ' + emp + ')';
          var m = headline.match(/(?:at|to|till|hos|for|@)\s+(.+?)(?:\s*[-,]|$)/i);
          company = m ? m[1].trim() : '(via ' + emp + ')';
        }

        results.push({ company: company, role: headline, url: url, location: (hit.workplace_address && hit.workplace_address.municipality) || location, description: desc, deadline: hit.application_deadline || '', industry: (hit.occupation && hit.occupation.label) || '', source: source });
      });
    } catch (e) {}
  }
  return results;
}

async function searchLinkedIn(terms, location, existingUrls) {
  var results = [];
  var PROXY = 'https://api.allorigins.win/raw?url=';
  for (var i = 0; i < Math.min(terms.length, 2); i++) {
    try {
      var searchUrl = 'https://www.linkedin.com/jobs-guest/jobs/api/seeMoreJobPostings/search?keywords=' + encodeURIComponent(terms[i]) + '&location=' + encodeURIComponent(location + ', Sweden') + '&start=0';
      var resp = await fetch(PROXY + encodeURIComponent(searchUrl), { signal: AbortSignal.timeout(8000) });
      if (!resp.ok) continue;
      var html = await resp.text();
      // Parse LinkedIn job cards from HTML
      var parser = new DOMParser();
      var doc = parser.parseFromString(html, 'text/html');
      var cards = doc.querySelectorAll('.base-card, .job-search-card, li');
      cards.forEach(function(card) {
        var titleEl = card.querySelector('.base-search-card__title, h3, h4');
        var compEl = card.querySelector('.base-search-card__subtitle, h4, .hidden-nested-link');
        var locEl = card.querySelector('.job-search-card__location, .base-search-card__metadata span');
        var linkEl = card.querySelector('a[href*="/jobs/view/"]') || card.querySelector('a');
        if (!titleEl || !linkEl) return;
        var role = (titleEl.textContent || '').trim();
        var company = compEl ? (compEl.textContent || '').trim() : '';
        var loc = locEl ? (locEl.textContent || '').trim() : location;
        var url = (linkEl.getAttribute('href') || '').split('?')[0];
        if (!role || !url) return;
        if (existingUrls.has(url.toLowerCase())) return;
        results.push({ company: company, role: role, url: url, location: loc, description: '', deadline: '', industry: '', source: 'LinkedIn' });
      });
    } catch (e) {}
  }
  return results;
}

async function searchTheHub(terms, location, existingUrls) {
  var results = [];
  var PROXY = 'https://api.allorigins.win/raw?url=';
  try {
    var url = 'https://thehub.io/jobs?search=' + encodeURIComponent(terms[0]) + '&location=sweden';
    var resp = await fetch(PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
    if (!resp.ok) return results;
    var html = await resp.text();
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');
    doc.querySelectorAll('a[href*="/jobs/"]').forEach(function(el) {
      var href = el.getAttribute('href') || '';
      if (!href.includes('/jobs/') || href.endsWith('/jobs') || href.endsWith('/jobs/')) return;
      var fullUrl = href.startsWith('http') ? href : 'https://thehub.io' + href;
      if (existingUrls.has(fullUrl.toLowerCase())) return;
      var title = (el.textContent || '').trim().substring(0, 120);
      // Try to split "Role at Company" or just use title
      var parts = title.split(/\s+at\s+|\s+-\s+/i);
      var role = parts[0] || title;
      var company = parts[1] || '';
      if (role.length > 5 && role.length < 100) {
        results.push({ company: company, role: role, url: fullUrl, location: '', description: '', deadline: '', industry: '', source: 'The Hub' });
      }
    });
  } catch (e) {}
  return results.slice(0, 10);
}

async function searchViaCorsProxy(pageUrl, sourceName, existingUrls) {
  // Generic: fetch page, try to extract links/titles
  var results = [];
  var PROXY = 'https://api.allorigins.win/raw?url=';
  try {
    var resp = await fetch(PROXY + encodeURIComponent(pageUrl), { signal: AbortSignal.timeout(8000) });
    if (!resp.ok) return results;
    var html = await resp.text();
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');
    // Look for job-like links
    doc.querySelectorAll('a').forEach(function(el) {
      var href = el.getAttribute('href') || '';
      var text = (el.textContent || '').trim();
      if (text.length > 10 && text.length < 120 && /director|chief|head|manager|lead|sales|commercial|vp|coo|cco|ceo/i.test(text)) {
        var fullUrl = href.startsWith('http') ? href : pageUrl.split('/').slice(0, 3).join('/') + href;
        if (!existingUrls.has(fullUrl.toLowerCase())) {
          results.push({ company: '', role: text, url: fullUrl, location: '', description: '', deadline: '', industry: '', source: sourceName.charAt(0).toUpperCase() + sourceName.slice(1) });
        }
      }
    });
  } catch (e) {}
  return results.slice(0, 8);
}

async function searchHeadhunterSite(siteUrl, firmName, terms, existingUrls) {
  var results = [];
  var proxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?'
  ];
  var html = '';
  try {
    for (var pi = 0; pi < proxies.length; pi++) {
      try {
        var resp = await fetch(proxies[pi] + encodeURIComponent(siteUrl), { signal: AbortSignal.timeout(8000) });
        if (resp.ok) {
          html = await resp.text();
          if (html.length > 500) break;
        }
      } catch(pe) {}
    }
    if (!html || html.length < 500) return results;
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');

    // Strategy 1: Look for JSON-LD structured data
    doc.querySelectorAll('script[type="application/ld+json"]').forEach(function(script) {
      try {
        var ld = JSON.parse(script.textContent);
        var items = Array.isArray(ld) ? ld : (ld['@graph'] || [ld]);
        items.forEach(function(item) {
          if (item['@type'] === 'JobPosting') {
            var url = item.url || siteUrl;
            if (!existingUrls.has(url.toLowerCase())) {
              results.push({
                company: (item.hiringOrganization && item.hiringOrganization.name) || '',
                role: item.title || '',
                url: url,
                location: (item.jobLocation && item.jobLocation.address && item.jobLocation.address.addressLocality) || '',
                description: (item.description || '').replace(/<[^>]*>/g, '').substring(0, 400),
                deadline: item.validThrough || '',
                industry: item.industry || '',
                source: firmName
              });
            }
          }
        });
      } catch (e) {}
    });

    // Strategy 2: Parse job listing links from HTML
    if (results.length === 0) {
      var baseDomain = siteUrl.split('/').slice(0, 3).join('/');
      doc.querySelectorAll('a').forEach(function(el) {
        var href = el.getAttribute('href') || '';
        var text = (el.textContent || '').trim();
        // Filter for job-like links (has meaningful text, links to job detail pages)
        if (text.length < 8 || text.length > 150) return;
        if (/cookie|integritet|privacy|om oss|about|kontakt|contact|logga in|login|blog/i.test(text)) return;
        // Check if it looks like a job title or contains relevant keywords
        var isJobLink = /jobb|uppdrag|position|vacancy|career|lediga|tjanst|tjänst|opdrag/i.test(href) ||
          /director|chief|head|manager|sales|commercial|vp|coo|cco|ceo|chef|ansvarig|ledare/i.test(text);
        if (!isJobLink) return;
        var fullUrl = href.startsWith('http') ? href : baseDomain + (href.startsWith('/') ? '' : '/') + href;
        if (existingUrls.has(fullUrl.toLowerCase())) return;
        if (results.some(function(r) { return r.role === text; })) return;
        results.push({ company: '', role: text, url: fullUrl, location: '', description: '', deadline: '', industry: '', source: firmName });
      });
    }
  } catch (e) {}
  return results.slice(0, 10);
}

function addAllSearchResults() {
  var results = window._searchResults || [];
  if (results.length === 0) return;
  var limitEl = document.getElementById('jobAddLimit');
  var limit = limitEl ? parseInt(limitEl.value, 10) : 10;
  if (!limit || limit < 1) limit = 10;
  var added = 0;
  results.forEach(function(r) {
    if (added >= limit) return;
    // Skip if already added (check URL)
    if (r.url && (DATA.savedJobs || []).some(function(j) { return (j.url || '').toLowerCase() === r.url.toLowerCase(); })) return;
    DATA.savedJobs = DATA.savedJobs || [];
    DATA.savedJobs.push({
      id: genId(),
      url: r.url || '',
      title: (r.company ? r.company + ' - ' : '') + r.role,
      company: r.company || '',
      role: r.role || '',
      industry: r.industry || '',
      location: r.location || '',
      note: 'Found via ' + (r.source || 'search') + '. ' + (r.deadline ? 'Deadline: ' + r.deadline.substring(0, 10) + '. ' : '') + (r.description ? r.description.substring(0, 300) : ''),
      description: r.description || '',
      reviewed: false,
      applied: false,
      addedAt: today()
    });
    added++;
  });
  if (added > 0) {
    saveData(DATA);
    toast('Added ' + added + ' jobs to your swipe queue!');
    setTimeout(function() { render(); }, 500);
  } else {
    toast('All jobs already in your list');
  }
}

async function runJobSearch(queries, location) {

      if (!resp.ok) continue;
      var data = await resp.json();
      if (data.hits && data.hits.length > 0) {
        data.hits.forEach(function(hit) {

          if (url && existingUrls.indexOf(url.toLowerCase()) >= 0) return;
          var employerName = (hit.employer && hit.employer.name) || '';
          var headline = hit.headline || '';
          var descText = (hit.description && hit.description.text) ? hit.description.text.substring(0, 800) : '';

          // Detect if employer is a recruiter/headhunter (not the actual company)
          var recruiterKeywords = ['rekrytering','rekryter','recruit','headhunt','executive search','bemanning','staffing','consulting','konsult','partner','search','urval','hanborg','hays','academic work','randstad','adecco','manpower'];
          var empLower = employerName.toLowerCase();
          var isRecruiter = recruiterKeywords.some(function(k) { return empLower.includes(k); });
          // Also check against our headhunter list
          if (!isRecruiter && DATA.headhunters) {
            isRecruiter = DATA.headhunters.some(function(h) { return empLower.includes(h.firm.toLowerCase()) || h.firm.toLowerCase().includes(empLower); });
          }

          var actualCompany = employerName;
          var recruiterSource = '';
          if (isRecruiter) {
            recruiterSource = employerName;
            // Try to extract actual company from headline: "Role at Company" or "Role - Company" or "Role till Company"
            var atMatch = headline.match(/(?:at|to|till|hos|for|@)\s+(.+?)(?:\s*[-,]|$)/i);
            if (atMatch) {
              actualCompany = atMatch[1].trim();
            } else {
              // Try from description first line
              var descCompMatch = descText.match(/(?:our client|uppdragsgivare|kund|company|client|employer|arbetsgivare)[:\s]+([A-Z][A-Za-zÅÄÖåäö\s&]+?)(?:[,.\n])/i);
              if (descCompMatch) {
                actualCompany = descCompMatch[1].trim();
              } else {
                actualCompany = '(via ' + employerName + ')';
              }
            }
          }

          // Extract role from headline (strip company part if present)
          var role = headline;
          if (isRecruiter && actualCompany !== '(via ' + employerName + ')') {
            role = headline.replace(/\s*(?:at|to|till|hos|for|@)\s+.+$/i, '').trim() || headline;
          }

          if (allResults.some(function(r){ return r.company === actualCompany && r.role === role; })) return;

          allResults.push({

            source: recruiterSource ? 'Platsbanken (via ' + recruiterSource + ')' : 'Platsbanken'
          });
        });
      }
    } catch(e) { /* API may not be available, continue to manual links */ }
  }

  if (linksDiv) linksDiv.style.display = 'block';

  if (allResults.length === 0) {
    if (resultsDiv) {
      resultsDiv.innerHTML = '<div style="text-align:center;padding:20px;">' +
        '<div style="font-size:32px;margin-bottom:8px;">&#128204;</div>' +
        '<p style="color:var(--text-light);margin-bottom:12px;">No new matches found on Platsbanken right now.</p>' +
        '<p style="font-size:12px;color:var(--text-light);">Use the links below to search other job boards directly.</p></div>';
    }
    return;
  }

  // Score and display results
  var dj = (DATA.dreamJob && DATA.dreamJob.dream) ? DATA.dreamJob.dream : getDefaultJobbmal().dream;
  var djTitles = (dj.title || '').toLowerCase().split(',').map(function(t){ return t.trim(); });
  var djIndustries = (dj.industries || '').toLowerCase().split(',').map(function(t){ return t.trim(); });
  var djLoc = (dj.location || '').toLowerCase();

  // Simple relevance scoring for search results
  allResults.forEach(function(r) {
    var score = 0;
    var roleL = (r.role + ' ' + r.industry).toLowerCase();
    var compL = r.company.toLowerCase();
    djTitles.forEach(function(t) { if (t && roleL.indexOf(t) >= 0) score += 30; });
    djIndustries.forEach(function(ind) { if (ind && (roleL.indexOf(ind) >= 0 || r.description.toLowerCase().indexOf(ind) >= 0)) score += 15; });
    if (djLoc.indexOf((r.location || '').toLowerCase().split(',')[0]) >= 0) score += 10;
    if (roleL.indexOf('director') >= 0 || roleL.indexOf('head of') >= 0 || roleL.indexOf('chief') >= 0 || roleL.indexOf('vp') >= 0) score += 20;
    if (roleL.indexOf('sales') >= 0 || roleL.indexOf('commercial') >= 0) score += 10;
    r._score = Math.min(score, 100);
  });

  allResults.sort(function(a,b) { return b._score - a._score; });
  var top = allResults.slice(0, 8);

  var html = '<div style="display:flex;flex-direction:column;gap:8px;">' +
    '<p style="font-size:12px;color:var(--text-light);margin-bottom:4px;">Found ' + allResults.length + ' results. Top matches:</p>';

  top.forEach(function(r, i) {
    var tierColor = r._score >= 50 ? 'var(--success)' : r._score >= 25 ? 'var(--warning)' : 'var(--text-light)';
    html += '<div class="card" style="padding:12px;cursor:pointer;" onclick="addSearchResult(' + i + ')">' +
      '<div style="display:flex;justify-content:space-between;align-items:start;">' +
      '<div style="flex:1;min-width:0;">' +
      '<div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(r.company) + '</div>' +
      '<div style="font-size:12px;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(r.role) + '</div>' +
      '<div style="font-size:11px;color:var(--text-light);margin-top:2px;">' + escHtml(r.location) + (r.deadline ? ' - Deadline: ' + r.deadline.substring(0,10) : '') + '</div>' +
      (r.source && r.source !== 'Platsbanken' ? '<div style="font-size:10px;color:var(--text-muted);margin-top:1px;">' + escHtml(r.source) + '</div>' : '') +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">' +
      '<span style="font-size:11px;font-weight:600;color:' + tierColor + ';">' + r._score + 'p</span>' +
      '<button class="btn btn-primary" style="font-size:11px;padding:4px 10px;min-height:28px;" onclick="event.stopPropagation();addSearchResult(' + i + ')">+ Add</button>' +
      '</div></div></div>';
  });

  html += '</div>';

  if (resultsDiv) resultsDiv.innerHTML = html;

  // Store results for adding
  window._searchResults = top;
}

function handleJobFileUpload(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var reader = new FileReader();
  reader.onload = function(e) {
    var content = e.target.result;
    // If HTML, strip tags to get plain text
    if (file.name.endsWith('.html') || file.name.endsWith('.htm') || file.name.endsWith('.mhtml')) {
      var parser = new DOMParser();
      var doc = parser.parseFromString(content, 'text/html');
      // Try JSON-LD first
      var jsonLdScripts = doc.querySelectorAll('script[type="application/ld+json"]');
      var foundJobPosting = false;
      for (var i = 0; i < jsonLdScripts.length; i++) {
        try {
          var ld = JSON.parse(jsonLdScripts[i].textContent);
          if (Array.isArray(ld)) ld = ld.find(function(item) { return item['@type'] === 'JobPosting'; }) || ld[0];
          if (ld['@graph']) ld = ld['@graph'].find(function(item) { return item['@type'] === 'JobPosting'; }) || ld;
          if (ld && ld['@type'] === 'JobPosting') {
            var ta = document.getElementById('pasteJobText');
            var structured = '';
            if (ld.title) structured += ld.title + '\n';
            if (ld.hiringOrganization) structured += 'Company: ' + (typeof ld.hiringOrganization === 'string' ? ld.hiringOrganization : ld.hiringOrganization.name || '') + '\n';
            if (ld.jobLocation) {
              var loc = Array.isArray(ld.jobLocation) ? ld.jobLocation[0] : ld.jobLocation;
              if (loc.address) structured += 'Location: ' + (typeof loc.address === 'string' ? loc.address : loc.address.addressLocality || loc.address.addressRegion || '') + '\n';
            }
            if (ld.description) structured += '\n' + ld.description.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
            if (ta) ta.value = structured;
            foundJobPosting = true;
            toast('Extracted job posting data from HTML');
            break;
          }
        } catch(ex) {}
      }
      if (!foundJobPosting) {
        // Fall back to body text
        var bodyText = (doc.querySelector('main') || doc.querySelector('article') || doc.querySelector('.content') || doc.body || {}).textContent || '';
        var ta = document.getElementById('pasteJobText');
        if (ta) ta.value = bodyText.replace(/\s+/g, ' ').trim();
        toast('Extracted text from HTML file');
      }
    } else {
      // Plain text
      var ta = document.getElementById('pasteJobText');
      if (ta) ta.value = content;
      toast('File loaded');
    }
  };
  reader.readAsText(file);
}

function parseJobFromText(text) {
  var result = { company: '', role: '', location: '', industry: '', description: '', deadline: '' };
  var lines = text.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);

  // Try to detect role from first heading-like line
  for (var i = 0; i < Math.min(lines.length, 5); i++) {
    var line = lines[i];
    // Skip very short lines or label lines
    if (line.length < 3 || line.endsWith(':')) continue;
    // Common role keywords
    if (/manager|director|head of|chief|vp |vice president|lead|officer|coo|cco|ceo|cto|cfo/i.test(line) && !result.role) {
      result.role = line.replace(/^(job title|position|role|titel)[:\s]*/i, '').trim();
      continue;
    }
    // If first substantial line and no role yet, use it as role
    if (!result.role && line.length > 5 && line.length < 120) {
      result.role = line;
      continue;
    }
  }

  // Extract company
  var companyMatch = text.match(/(?:^|\n)\s*(?:company|employer|organization|bolag|foretag|about)\s*[:\-]\s*(.+)/im);
  if (companyMatch) result.company = companyMatch[1].trim().substring(0, 100);
  if (!result.company) {
    // Try "at Company" in role
    var atMatch = (result.role || '').match(/^(.+?)\s+(?:at|@|hos|till)\s+(.+)$/i);
    if (atMatch) { result.role = atMatch[1].trim(); result.company = atMatch[2].trim(); }
  }
  if (!result.company) {
    // Try "About [Company]" section
    var aboutMatch = text.match(/(?:about|om)\s+([A-Z][A-Za-zÅÄÖåäö\s&.]+?)(?:\n|is |was |has |provides|delivers|offers|builds|helps)/i);
    if (aboutMatch && aboutMatch[1].trim().length < 60) result.company = aboutMatch[1].trim();
  }

  // Extract location
  var locMatch = text.match(/(?:location|plats|ort|stad|based in|baserad i)\s*[:\-]\s*(.+)/im);
  if (locMatch) result.location = locMatch[1].trim().split(/[,.\n]/)[0].trim();
  if (!result.location) {
    // Look for Swedish city names
    var cities = ['stockholm','malmö','göteborg','gothenburg','lund','helsingborg','copenhagen','denmark','sweden','norge','norway','finland','remote'];
    var textLower = text.toLowerCase();
    for (var c = 0; c < cities.length; c++) {
      if (textLower.includes(cities[c])) { result.location = cities[c].charAt(0).toUpperCase() + cities[c].slice(1); break; }
    }
  }

  // Industry detection
  var finKeywords = ['bank','insurance','fintech','financial','lending','mortgage','payment','fin-tech'];
  var techKeywords = ['saas','software','platform','tech','cloud','ai','machine learning'];
  var textLower = text.toLowerCase();
  if (finKeywords.some(function(k) { return textLower.includes(k); })) result.industry = 'Financial Services / Fintech';
  else if (techKeywords.some(function(k) { return textLower.includes(k); })) result.industry = 'Technology / SaaS';

  // Description is the full text, cleaned up
  result.description = text.replace(/\s+/g, ' ').trim().substring(0, 2000);

  // Deadline
  var deadlineMatch = text.match(/(?:deadline|sista ansokningsdag|apply before|last day)\s*[:\-]\s*(\d{4}-\d{2}-\d{2}|\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/i);
  if (deadlineMatch) result.deadline = deadlineMatch[1];

  return result;
}

async function fetchAndParseJobAd(url) {
  var PROXY = 'https://api.allorigins.win/raw?url=';
  var progressEl = document.getElementById('analyzeProgress');

  try {
    // LinkedIn special handling: extract job ID and use public view URL
    var linkedinJobId = null;
    if (url.includes('linkedin.com')) {
      // Extract job ID from various LinkedIn URL formats
      var jobIdMatch = url.match(/currentJobId=(\d+)/) || url.match(/jobs\/view\/(\d+)/) || url.match(/jobs\/(\d+)/);
      if (jobIdMatch) {
        linkedinJobId = jobIdMatch[1];
        // Use the public job view URL (more likely to work with CORS proxy)
        url = 'https://www.linkedin.com/jobs/view/' + linkedinJobId;
        if (progressEl) progressEl.textContent = 'Found LinkedIn job #' + linkedinJobId + ', fetching...';
      }
    }

    if (progressEl && !linkedinJobId) progressEl.textContent = 'Fetching page...';
    var resp = await fetch(PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) });
    if (!resp.ok) {
      // If LinkedIn blocked via proxy, try alternative proxy
      if (linkedinJobId) {
        if (progressEl) progressEl.textContent = 'Trying alternative fetch...';
        resp = await fetch('https://corsproxy.io/?' + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) });
      }
      if (!resp || !resp.ok) return null;
    }
    var html = await resp.text();

    // Check if we got a real page (not a login wall or empty response)
    if (html.length < 500 || (html.includes('authwall') && !html.includes('JobPosting'))) {
      if (progressEl) progressEl.textContent = 'Site requires login - could not fetch job details.';
      return null;
    }
    if (progressEl) progressEl.textContent = 'Parsing job details...';

    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');

    var result = { company: '', role: '', location: '', industry: '', description: '', deadline: '' };

    // Try JSON-LD first (best structured data)
    var jsonLdScripts = doc.querySelectorAll('script[type="application/ld+json"]');
    for (var i = 0; i < jsonLdScripts.length; i++) {
      try {
        var ld = JSON.parse(jsonLdScripts[i].textContent);
        // Handle arrays
        if (Array.isArray(ld)) ld = ld.find(function(item) { return item['@type'] === 'JobPosting'; }) || ld[0];
        if (ld['@graph']) ld = (ld['@graph'].find(function(item) { return item['@type'] === 'JobPosting'; })) || ld;

        if (ld['@type'] === 'JobPosting') {
          result.role = ld.title || ld.name || '';
          if (ld.hiringOrganization) {
            result.company = typeof ld.hiringOrganization === 'string' ? ld.hiringOrganization : (ld.hiringOrganization.name || '');
          }
          if (ld.jobLocation) {
            var loc = Array.isArray(ld.jobLocation) ? ld.jobLocation[0] : ld.jobLocation;
            if (loc.address) {
              var addr = typeof loc.address === 'string' ? loc.address : (loc.address.addressLocality || loc.address.addressRegion || '');
              result.location = addr;
            } else if (loc.name) {
              result.location = loc.name;
            }
          }
          result.description = (ld.description || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().substring(0, 2000);
          if (ld.validThrough) result.deadline = ld.validThrough.substring(0, 10);
          if (ld.industry) result.industry = ld.industry;
          if (result.role) return result;
        }
      } catch(e) { /* skip bad JSON-LD */ }
    }

    // Fallback: parse meta tags and page content
    var ogTitle = (doc.querySelector('meta[property="og:title"]') || {}).content || '';
    var ogDesc = (doc.querySelector('meta[property="og:description"]') || {}).content || '';
    var pageTitle = (doc.querySelector('title') || {}).textContent || '';
    var h1 = (doc.querySelector('h1') || {}).textContent || '';

    // Try to extract role from title/h1
    result.role = h1.trim() || ogTitle.trim() || pageTitle.trim();
    // Clean up common suffixes
    result.role = result.role.replace(/\s*[-|]\s*(LinkedIn|Indeed|Platsbanken|The Hub|MeetFrank).*$/i, '').trim();

    // Try to extract company
    var companyMeta = doc.querySelector('meta[property="og:site_name"]');
    if (companyMeta && companyMeta.content) result.company = companyMeta.content;

    // Try common selectors for company name
    if (!result.company) {
      var companyEl = doc.querySelector('.company-name, .employer-name, [data-company], .topcard__org-name-link, .job-details-jobs-unified-top-card__company-name');
      if (companyEl) result.company = companyEl.textContent.trim();
    }

    // Try to split "Role at Company" patterns
    if (!result.company && result.role) {
      var atMatch = result.role.match(/^(.+?)\s+(?:at|@|hos|till)\s+(.+)$/i);
      if (atMatch) {
        result.role = atMatch[1].trim();
        result.company = atMatch[2].trim();
      }
    }

    // Extract description from page body
    var bodyText = '';
    var descEl = doc.querySelector('.description, .job-description, [class*="description"], article, .content, main');
    if (descEl) bodyText = descEl.textContent;
    if (!bodyText) bodyText = (doc.body || {}).textContent || '';
    result.description = bodyText.replace(/\s+/g, ' ').trim().substring(0, 2000);
    if (!result.description && ogDesc) result.description = ogDesc;

    // Try to find location in content
    if (!result.location) {
      var locEl = doc.querySelector('.location, .job-location, [class*="location"]');
      if (locEl) result.location = locEl.textContent.trim();
    }

    if (progressEl) progressEl.textContent = 'Analysis complete!';
    return result.role ? result : null;

  } catch(e) {
    if (progressEl) progressEl.textContent = 'Could not fetch page: ' + e.message;
    return null;
  }
}

function updateDimSlider(el) {
  var pct = parseInt(el.value);
  var valSpan = el.nextElementSibling;
  if (valSpan) valSpan.textContent = pct + '%';
  var col = pct >= 70 ? 'var(--success)' : pct >= 40 ? 'var(--warning)' : 'var(--danger)';
  el.style.accentColor = col;
  // Enable the reset button
  var resetBtn = valSpan ? valSpan.nextElementSibling : null;
  if (resetBtn) { resetBtn.style.opacity = '1'; resetBtn.style.pointerEvents = 'auto'; }
  // Update label to show override marker
  var label = el.previousElementSibling;
  if (label && !label.textContent.includes('*')) label.textContent = label.textContent.trim() + ' *';
  label.style.fontWeight = '700';
  // Recalculate total score preview
  recalcDimTotal();
}

function resetDimSlider(btn, dimKey, autoPct) {
  var row = btn.parentElement;
  var slider = row.querySelector('input[type="range"]');
  var valSpan = row.querySelector('.dim-slider-val');
  if (slider) { slider.value = autoPct; slider.style.accentColor = autoPct >= 70 ? 'var(--success)' : autoPct >= 40 ? 'var(--warning)' : 'var(--danger)'; }
  if (valSpan) valSpan.textContent = autoPct + '%';
  btn.style.opacity = '0.3'; btn.style.pointerEvents = 'none';
  // Remove override marker from label
  var label = row.querySelector('span');
  if (label) { label.textContent = label.textContent.replace(' *', ''); label.style.fontWeight = '400'; }
  slider.removeAttribute('data-overridden');
  recalcDimTotal();
}

function recalcDimTotal() {
  var sliders = document.querySelectorAll('.dim-slider');
  var dimMaxPts = { roll: 25, bransch: 15, plats: 15, scope: 20, bolag: 10 };
  var total = 0;
  sliders.forEach(function(s) {
    var pct = parseInt(s.value) || 0;
    var maxPts = dimMaxPts[s.getAttribute('data-dim')] || 0;
    total += Math.round(pct / 100 * maxPts);
  });
  var el = document.getElementById('dimScoreTotal');
  if (el) el.textContent = Math.min(100, total) + 'p';
}

function saveJobNote(id) {
  const j = (DATA.savedJobs || []).find(x => x.id === id);
  if (!j) return;
  let company = document.getElementById('f_jcompanysel').value;
  if (company === '__other') company = document.getElementById('f_jcompanyother').value.trim();
  if (company === '') company = (document.getElementById('f_jcompanyother') || {}).value || '';

  j.title = document.getElementById('f_jtitle').value.trim() || j.title;
  j.company = company.trim();
  j.role = document.getElementById('f_jrole').value.trim();
  j.industry = document.getElementById('f_jindustry').value.trim();
  j.note = document.getElementById('f_jnote').value.trim();
  j.description = (document.getElementById('f_jdescription') || {}).value || '';
  j.reviewed = true;

  // Save dimension slider overrides
  var sliders = document.querySelectorAll('.dim-slider');
  if (sliders.length > 0) {
    // First recalc auto scores with updated fields
    var freshRel = getRelevanceScore(j);
    var autoDims = { roll: freshRel.dims.roll, bransch: freshRel.dims.bransch, plats: freshRel.dims.plats, scope: freshRel.dims.scope, bolag: freshRel.dims.bolag };
    var dimMaxPts = { roll: 25, bransch: 15, plats: 15, scope: 20, bolag: 10 };
    var overrides = {};
    sliders.forEach(function(s) {
      var dimKey = s.getAttribute('data-dim');
      var maxPts = dimMaxPts[dimKey] || 0;
      var sliderPct = parseInt(s.value) || 0;
      var autoPct = Math.min(100, Math.max(0, Math.round(autoDims[dimKey] || 0)));
      // Only save as override if different from auto
      if (Math.abs(sliderPct - autoPct) > 5) {
        overrides[dimKey] = Math.round(sliderPct / 100 * maxPts);
      }
    });
    if (Object.keys(overrides).length > 0) {
      j.dimOverrides = overrides;
    } else {
      delete j.dimOverrides;
    }
  }

  saveData(DATA);
  closeModal();
  const rel = getRelevanceScore(j);
  toast('Job updated - ' + tierBadge(rel.tier).replace(/<[^>]*>/g, '') + ' (' + rel.score + 'p)');
  render();
}

// ---- WEEK HELPERS ----
function getWeekId(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday
  const monday = new Date(d.setDate(diff));
  return monday.toISOString().slice(0, 10);
}

function getWeekStart(weekId) { return weekId; }

function getWeekEnd(weekId) {
  const d = new Date(weekId + 'T00:00:00');
  d.setDate(d.getDate() + 6);
  return d.toISOString().slice(0, 10);
}

function getWeekActuals(weekId) {
  const start = weekId;
  const end = getWeekEnd(weekId);
  const inWeek = (date) => date >= start && date <= end;

  const apps = (DATA.applications || []).filter(a => inWeek(a.dateApplied)).length;
  const contactsReached = DATA.activities.filter(a => inWeek(a.date) && a.contactId && ['email','call','linkedin','meeting'].includes(a.type)).length;
  const meetings = DATA.activities.filter(a => inWeek(a.date) && a.type === 'meeting').length;
  const followups = DATA.activities.filter(a => inWeek(a.date) && a.type === 'follow-up').length;
  const jobsReviewed = (DATA.savedJobs || []).filter(j => j.qualifiedAt && inWeek(j.qualifiedAt)).length;

  return { applications: apps, contacts: contactsReached, meetings, followups, jobsReviewed };
}

        <span class="metric-count" style="font-style:italic;">not set</span>
      </div>
      <div class="metric-bar"><div class="metric-fill bg-gray" style="width:0%;"></div></div>
    </div>`;
  const pct = Math.min(100, Math.round((actual / target) * 100));
  const color = pct >= 100 ? 'green' : pct >= 50 ? 'yellow' : 'red';
  return `
    <div class="target-metric">
      <div class="metric-header">
        <span class="metric-label">${label}</span>
        <span class="metric-count">${actual} / ${target}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill ${color}" style="width:${pct}%"></div></div>
    </div>
  `;
}

  t.keyActivities[index].done = !t.keyActivities[index].done;

}

function deleteKeyActivity(weekId, index) {
  const t = (DATA.weeklyTargets || []).find(x => x.weekId === weekId);
  if (!t || !t.keyActivities) return;
  t.keyActivities.splice(index, 1);

function saveTarget(existingWeekId) {
  const weekInput = document.getElementById('f_tweek').value;
  const weekId = getWeekId(new Date(weekInput + 'T00:00:00'));

  if (!DATA.weeklyTargets) DATA.weeklyTargets = [];

  // Gather key activities from form
  const kaInputs = document.querySelectorAll('#kaList .ka-input');
  const newKas = [];
  const existingTarget = (DATA.weeklyTargets || []).find(t => t.weekId === weekId || t.weekId === existingWeekId);
  const oldKas = existingTarget ? (existingTarget.keyActivities || []) : [];

  kaInputs.forEach(input => {
    const text = input.value.trim();
    if (!text) return;
    // Preserve done state if text matches an existing activity
    const existing = oldKas.find(k => k.text === text);
    newKas.push({ text, done: existing ? existing.done : false });
  });

  const obj = {
    weekId,
    applications: parseInt(document.getElementById('f_tapps').value) || 0,
    contacts: parseInt(document.getElementById('f_tcontacts').value) || 0,
    meetings: parseInt(document.getElementById('f_tmeetings').value) || 0,
    followups: parseInt(document.getElementById('f_tfollowups').value) || 0,
    jobsReviewed: parseInt(document.getElementById('f_tjobsreviewed').value) || 0,
    keyActivities: newKas,
    notes: document.getElementById('f_tnotes').value.trim()
  };

  DATA.weeklyTargets = DATA.weeklyTargets.filter(t => t.weekId !== weekId);
  if (existingWeekId && existingWeekId !== weekId) {
    DATA.weeklyTargets = DATA.weeklyTargets.filter(t => t.weekId !== existingWeekId);
  }
  DATA.weeklyTargets.push(obj);
  saveData(DATA);
  closeModal();
  toast('Weekly targets saved');
  render();
}

function deleteTarget(weekId) {
  if (!confirm('Delete targets for this week?')) return;
  DATA.weeklyTargets = (DATA.weeklyTargets || []).filter(t => t.weekId !== weekId);
  saveData(DATA);
  toast('Targets deleted');
  render();
}

function appStatusBadge(s) {
  switch(s) {
    case 'applied': return 'badge-blue';
    case 'interviewing': return 'badge-purple';
    case 'assessment': return 'badge-yellow';
    case 'offer': return 'badge-green';
    case 'rejected': return 'badge-red';
    case 'withdrawn': return 'badge-gray';
    default: return 'badge-gray';
  }
}

function getAppNextStep(app) {
  const now = new Date();
  const applied = app.dateApplied ? new Date(app.dateApplied + 'T00:00:00') : null;
  const daysSince = applied ? Math.floor((now - applied) / 86400000) : null;
  const lastUpdate = app.lastUpdate ? new Date(app.lastUpdate + 'T00:00:00') : applied;
  const daysSinceUpdate = lastUpdate ? Math.floor((now - lastUpdate) / 86400000) : null;

  if (app.status === 'rejected' || app.status === 'withdrawn') return { text: 'Closed', cls: 'next-step badge-gray' };
  if (app.status === 'offer') return { text: 'Evaluate & respond', cls: 'next-step next-step-urgent' };
  if (app.status === 'interviewing') {
    if (daysSinceUpdate > 7) return { text: 'Follow up (' + daysSinceUpdate + 'd)', cls: 'next-step next-step-urgent' };
    return { text: 'Prep for interview', cls: 'next-step next-step-ok' };
  }
  if (app.status === 'assessment') {
    if (daysSinceUpdate > 5) return { text: 'Check deadline', cls: 'next-step next-step-soon' };
    return { text: 'Complete assessment', cls: 'next-step next-step-ok' };
  }
  // applied
  if (daysSince > 14) return { text: 'Follow up (' + daysSince + 'd)', cls: 'next-step next-step-urgent' };
  if (daysSince > 7) return { text: 'Consider following up', cls: 'next-step next-step-soon' };
  return { text: 'Awaiting response', cls: 'next-step next-step-ok' };
}

  const obj = {

    company,
    role,
    dateApplied: document.getElementById('f_appdate').value,
    status: document.getElementById('f_appstatus').value,
    source: document.getElementById('f_appsource').value.trim(),
    url: document.getElementById('f_appurl').value.trim(),
    lastUpdate: document.getElementById('f_applastupdate').value || null,
    salary: document.getElementById('f_appsalary').value.trim(),
    notes: document.getElementById('f_appnotes').value.trim(),
    createdAt: id ? ((DATA.applications.find(x => x.id === id) || {}).createdAt || today()) : today(),
    updatedAt: today()

  if (id) {

  saveData(DATA);
  closeModal();
  toast(id ? 'Application updated' : 'Application added');
  render();

HANS'S RESUME (use this to match experience to job requirements):
${HANS_RESUME_SUMMARY}

${HANS_COVER_LETTER_EXAMPLE}

2. "Why this role and why [Company]" section: Connect to the company's mission/values with genuine reasoning, not generic praise.
3. 3-4 themed sections that match the job requirements to Hans's specific experience. Use the section headers from the job ad where possible. Each section should include concrete numbers or examples from the resume.
4. Closing: Short, confident, suggest a meeting. End with "Sincerely, Hans"

CRITICAL RULES:
- Sound like a Swedish senior executive, not an American MBA student
- Every claim must reference a specific role, number, or achievement from the resume

- Do NOT repeat the same achievement in multiple sections
- Write in English unless the job ad is in Swedish (then write in Swedish)
- Output the cover letter text only, ready to paste into a document`;

  if (personalNote) {
    prompt += `\n\nHANS'S PERSONAL NOTES FOR THIS APPLICATION:\n${personalNote}`;
